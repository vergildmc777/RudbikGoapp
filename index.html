<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>RudbikGo | Tienda Oficial</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2C1810">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RudbikGo">
<link rel="apple-touch-icon" href="icon-192.png">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#FAFAF7;font-family:'DM Sans',sans-serif;overflow:hidden;}

.app{display:flex;flex-direction:column;height:100vh;max-width:430px;margin:0 auto;background:#FAFAF7;position:relative;}

/* INSTALL BANNER */
#install-banner{display:none;background:#C8703A;color:white;padding:13px 20px;text-align:center;font-size:13px;cursor:pointer;letter-spacing:0.3px;font-weight:500;}
#install-banner:active{background:#A85C2E;}

/* HEADER */
.header{display:flex;justify-content:space-between;align-items:center;padding:16px 24px;background:#2C1810;color:white;flex-shrink:0;}
.header-title{font-family:'Cormorant Garamond',serif;font-size:22px;letter-spacing:2px;}
.header-right{display:flex;align-items:center;gap:14px;}
.cart-icon{font-size:22px;cursor:pointer;position:relative;}
.cart-count{position:absolute;top:-6px;right:-6px;background:#C8703A;color:white;border-radius:50%;width:17px;height:17px;font-size:10px;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;}

/* SCREEN */
.screen{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.screen::-webkit-scrollbar{display:none;}

/* NAV BAR */
.nav-bar{display:flex;justify-content:space-around;padding:12px 0 env(safe-area-inset-bottom,16px);background:rgba(250,250,247,0.97);border-top:1px solid #EDEBE6;flex-shrink:0;backdrop-filter:blur(10px);}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:#9B8B77;font-size:10px;letter-spacing:0.3px;padding:0 18px;transition:color 0.2s;}
.nav-item.active{color:#C8703A;}
.nav-icon{font-size:22px;}

/* WHATSAPP */
.wa-btn{position:fixed;bottom:85px;right:16px;background:#25D366;color:white;width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 4px 16px rgba(0,0,0,0.25);z-index:50;text-decoration:none;transition:transform 0.2s;}
.wa-btn:active{transform:scale(0.9);}

/* ── HOME ── */
.hero{background:linear-gradient(155deg,#2C1810 0%,#5C3317 55%,#7A4520 100%);padding:48px 24px 40px;color:white;position:relative;overflow:hidden;}
.hero::after{content:'';position:absolute;right:-40px;top:-40px;width:220px;height:220px;border-radius:50%;background:rgba(200,160,110,0.12);pointer-events:none;}
.hero-tag{background:rgba(200,160,110,0.25);border:1px solid rgba(200,160,110,0.4);color:#C8A96E;font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:4px 14px;border-radius:20px;display:inline-block;margin-bottom:14px;}
.hero h1{font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:300;line-height:1.15;margin-bottom:10px;}
.hero em{font-style:italic;color:#C8A96E;}
.hero p{font-size:13px;color:rgba(255,255,255,0.68);margin-bottom:22px;line-height:1.6;}
.btn-primary{background:#C8703A;color:white;border:none;padding:13px 28px;border-radius:30px;font-size:13px;font-weight:500;cursor:pointer;letter-spacing:0.5px;font-family:'DM Sans',sans-serif;}
.btn-primary:active{background:#A85C2E;}

.trust-strip{display:flex;justify-content:space-around;background:white;padding:14px 8px;border-bottom:1px solid #EDEBE6;}
.trust-item{display:flex;flex-direction:column;align-items:center;gap:4px;}
.trust-icon{font-size:20px;}
.trust-text{font-size:9px;color:#7B6B5B;text-align:center;max-width:58px;line-height:1.3;}

.section{padding:22px 20px 6px;}
.section-title{font-family:'Cormorant Garamond',serif;font-size:24px;color:#1C1208;margin-bottom:3px;}
.section-sub{font-size:12px;color:#9B8B77;letter-spacing:0.3px;}

/* PRODUCT CARD */
.product-card{background:white;border-radius:20px;margin:12px 20px 0;display:flex;box-shadow:0 2px 18px rgba(0,0,0,0.06);cursor:pointer;overflow:hidden;transition:transform 0.15s;}
.product-card:active{transform:scale(0.98);}
.product-card:last-child{margin-bottom:16px;}
.prod-img{width:108px;height:108px;display:flex;align-items:center;justify-content:center;font-size:42px;flex-shrink:0;}
.prod-info{padding:14px 14px 14px 10px;flex:1;display:flex;flex-direction:column;justify-content:space-between;}
.prod-name{font-family:'Cormorant Garamond',serif;font-size:17px;color:#1C1208;font-weight:600;margin-bottom:3px;}
.prod-desc{font-size:11px;color:#9B8B77;line-height:1.4;margin-bottom:8px;}
.price-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.price{font-size:17px;font-weight:500;color:#1C1208;}
.price-old{font-size:12px;color:#B5A898;text-decoration:line-through;}
.badge{background:#E8F5E9;color:#2E7D32;font-size:10px;font-weight:500;padding:2px 8px;border-radius:10px;}

/* REVIEWS */
.reviews-row{display:flex;gap:12px;overflow-x:auto;padding:14px 20px 20px;scrollbar-width:none;}
.reviews-row::-webkit-scrollbar{display:none;}
.review-card{background:white;border-radius:16px;padding:14px;min-width:210px;flex-shrink:0;box-shadow:0 2px 12px rgba(0,0,0,0.05);}
.review-stars{color:#C8703A;font-size:12px;margin-bottom:6px;}
.review-text{font-size:12px;color:#5C4D3D;line-height:1.5;font-style:italic;margin-bottom:8px;}
.review-author{font-family:'Cormorant Garamond',serif;font-size:14px;color:#1C1208;font-weight:600;}

/* ── SHOP ── */
.shop-header{padding:48px 20px 14px;}
.shop-header h2{font-family:'Cormorant Garamond',serif;font-size:28px;color:#1C1208;margin-bottom:3px;}

/* ── DETAIL ── */
.detail-hero{position:relative;}
.detail-img{width:100%;height:270px;display:flex;align-items:center;justify-content:center;font-size:100px;}
.back-btn{position:absolute;top:48px;left:18px;width:40px;height:40px;background:rgba(255,255,255,0.92);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;border:none;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,0.15);}
.detail-body{padding:22px 22px 120px;}
.detail-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;}
.detail-name{font-family:'Cormorant Garamond',serif;font-size:26px;color:#1C1208;flex:1;margin-right:12px;}
.detail-sub{font-size:13px;color:#9B8B77;margin-bottom:14px;}
.detail-price-row{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
.detail-price{font-family:'Cormorant Garamond',serif;font-size:32px;color:#C8703A;}
.detail-desc{font-size:13px;color:#5C4D3D;line-height:1.75;margin-bottom:18px;}
.benefits{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;}
.benefit-pill{background:#F5F0E8;color:#5C4D3D;font-size:11px;padding:6px 14px;border-radius:20px;}
.info-strip{background:#F5F0E8;border-radius:14px;padding:12px 16px;margin-bottom:22px;display:flex;gap:18px;font-size:12px;color:#5C4D3D;}
.add-btn{width:100%;background:#1C1208;color:white;border:none;padding:18px;border-radius:30px;font-size:14px;font-weight:500;cursor:pointer;letter-spacing:0.5px;transition:background 0.3s;font-family:'DM Sans',sans-serif;}
.add-btn.added{background:#2E7D32;}
.add-btn:active{opacity:0.85;}

/* ── CART ── */
.cart-header{padding:48px 22px 16px;}
.cart-title{font-family:'Cormorant Garamond',serif;font-size:30px;color:#1C1208;}
.cart-item{background:white;border-radius:16px;padding:14px;display:flex;align-items:center;gap:12px;margin:0 20px 12px;box-shadow:0 2px 12px rgba(0,0,0,0.05);}
.cart-emoji{font-size:30px;width:46px;text-align:center;flex-shrink:0;}
.cart-item-name{font-family:'Cormorant Garamond',serif;font-size:16px;color:#1C1208;font-weight:600;}
.cart-item-price{font-size:13px;color:#9B8B77;margin-top:2px;}
.qty-row{display:flex;align-items:center;gap:10px;margin-top:6px;}
.qty-btn{width:26px;height:26px;border-radius:50%;border:1px solid #EDEBE6;background:white;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}
.qty-num{font-size:14px;font-weight:500;min-width:20px;text-align:center;}
.remove-btn{margin-left:auto;background:#FFF0F0;border:none;color:#E57373;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cart-total-box{margin:16px 20px 8px;background:#1C1208;border-radius:20px;padding:20px;color:white;}
.cart-total-label{font-size:11px;color:rgba(255,255,255,0.5);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;}
.cart-total-amount{font-family:'Cormorant Garamond',serif;font-size:38px;margin-bottom:16px;}
.checkout-btn{width:100%;background:#C8703A;color:white;border:none;padding:16px;border-radius:25px;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;}
.checkout-btn:active{background:#A85C2E;}
.empty-cart{text-align:center;padding:80px 24px;}
.empty-cart .ei{font-size:64px;margin-bottom:16px;}
.empty-cart p{font-family:'Cormorant Garamond',serif;font-size:20px;color:#9B8B77;line-height:1.6;}

/* TOAST */
#toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#1C1208;color:white;padding:12px 24px;border-radius:30px;font-size:13px;font-family:'DM Sans',sans-serif;opacity:0;transition:opacity 0.3s;z-index:200;white-space:nowrap;pointer-events:none;}
</style>
</head>
<body>

<div class="app">
  <div id="install-banner">✨ Instalar RudbikGo en tu móvil — toca aquí</div>

  <div class="header">
    <span class="header-title">RUDBIKGO</span>
    <div class="header-right">
      <div class="cart-icon" onclick="goTo('cart')">
        🛒
        <span class="cart-count" id="cart-count" style="display:none">0</span>
      </div>
    </div>
  </div>

  <div class="screen" id="screen"></div>

  <div class="nav-bar">
    <div class="nav-item active" id="nav-home" onclick="goTo('home')">
      <span class="nav-icon">🏠</span>Inicio
    </div>
    <div class="nav-item" id="nav-shop" onclick="goTo('shop')">
      <span class="nav-icon">🌿</span>Tienda
    </div>
    <div class="nav-item" id="nav-cart" onclick="goTo('cart')">
      <span class="nav-icon">🛒</span>Carrito
    </div>
  </div>
</div>

<a href="https://wa.me/34600000000" class="wa-btn" target="_blank">💬</a>
<div id="toast"></div>

<script>
// ── Productos ──────────────────────────────────────────────────
const PRODUCTS = [
  {
    id: 1, name: "Crema de Jengibre",
    subtitle: "Fortalece tu cabello desde la raíz",
    price: 29.90, old: 59.80, discount: "50%",
    emoji: "🫚", bg: "#FFF8EE",
    desc: "Fórmula activa con jengibre y extractos botánicos. Estimula la circulación del cuero cabelludo y fortalece el folículo capilar sin sulfatos ni químicos agresivos.",
    benefits: ["Estimula la circulación", "Fortalece la raíz", "Sin sulfatos"],
  },
  {
    id: 2, name: "Lumiéra Skin Corrector",
    subtitle: "Sérum iluminador corrector de manchas",
    price: 29.95, old: 34.99, discount: "14%",
    emoji: "✨", bg: "#FFF0F5",
    desc: "Sérum iluminador de 50ml para una piel radiante, uniforme y sin imperfecciones. Resultados visibles desde las primeras semanas.",
    benefits: ["Piel radiante", "Reduce manchas", "50ml de sérum"],
  },
  {
    id: 3, name: "Aceite de Romero",
    subtitle: "Crecimiento y Reparación Capilar",
    price: 32.90, old: 65.80, discount: "50%",
    emoji: "🌿", bg: "#F0F7F2",
    desc: "Aceite esencial de romero para el cuidado del cabello. Estimula el crecimiento y repara el daño capilar con ingredientes 100% naturales.",
    benefits: ["100% natural", "Crecimiento visible", "Repara el daño"],
  },
];

// ── Estado ─────────────────────────────────────────────────────
let cart = [];
let currentScreen = 'home';
let selectedProduct = null;
let prevScreen = 'home';
let addedId = null;

// ── Navegación ─────────────────────────────────────────────────
function goTo(screen, product = null) {
  prevScreen = ['home','shop','cart'].includes(currentScreen) ? currentScreen : prevScreen;
  currentScreen = screen;
  if (product) selectedProduct = product;

  // Nav active state
  ['home','shop','cart'].forEach(s => {
    document.getElementById('nav-' + s)?.classList.toggle('active', s === screen);
  });

  document.getElementById('screen').scrollTop = 0;
  render();
}

// ── Render principal ───────────────────────────────────────────
function render() {
  const s = document.getElementById('screen');
  if (currentScreen === 'home')   s.innerHTML = renderHome();
  if (currentScreen === 'shop')   s.innerHTML = renderShop();
  if (currentScreen === 'detail') s.innerHTML = renderDetail();
  if (currentScreen === 'cart')   s.innerHTML = renderCart();
  updateCartBadge();
}

// ── HOME ───────────────────────────────────────────────────────
function renderHome() {
  return `
    <div class="hero">
      <div class="hero-tag">✦ Cuidado Capilar Natural</div>
      <h1>Tu cabello,<br><em>su mejor versión</em></h1>
      <p>Ingredientes naturales. Resultados visibles desde las primeras semanas.</p>
      <button class="btn-primary" onclick="goTo('shop')">Ver Productos →</button>
    </div>
    <div class="trust-strip">
      ${[['🚚','Envío 24/48h'],['💳','Pago al recibir'],['⭐','10K+ clientes'],['↩️','30 días']].map(([i,t])=>`
        <div class="trust-item"><span class="trust-icon">${i}</span><span class="trust-text">${t}</span></div>
      `).join('')}
    </div>
    <div class="section">
      <div class="section-title">Best Sellers</div>
      <div class="section-sub">Los más amados por nuestra comunidad</div>
    </div>
    ${PRODUCTS.map(p => productCard(p)).join('')}
    <div class="section">
      <div class="section-title">Lo que dicen</div>
      <div class="section-sub">Opiniones reales</div>
    </div>
    <div class="reviews-row">
      ${[
        {name:'Ana-María',age:32,text:'"Me devolvió el volumen sin gastar en tratamientos caros. ¡Por fin dejó de caer!"'},
        {name:'Abigail',age:29,text:'"¡Wow! No esperaba que funcionara tan rápido. La sensación es increíble."'},
        {name:'Irina',age:34,text:'"Me dejó la piel súper suave y ligera. ¡Estoy obsesionada!"'},
      ].map(r => `
        <div class="review-card">
          <div class="review-stars">★★★★★</div>
          <div class="review-text">${r.text}</div>
          <div class="review-author">${r.name}, ${r.age} años</div>
        </div>
      `).join('')}
    </div>
  `;
}

// ── SHOP ───────────────────────────────────────────────────────
function renderShop() {
  return `
    <div class="shop-header">
      <h2>Nuestra Selección</h2>
      <div class="section-sub">Todos los productos RudbikGo</div>
    </div>
    ${PRODUCTS.map(p => productCard(p)).join('')}
  `;
}

function productCard(p) {
  return `
    <div class="product-card" onclick="goTo('detail', ${JSON.stringify(p).replace(/"/g,'&quot;')})">
      <div class="prod-img" style="background:${p.bg}">${p.emoji}</div>
      <div class="prod-info">
        <div>
          <div class="prod-name">${p.name}</div>
          <div class="prod-desc">${p.subtitle}</div>
        </div>
        <div class="price-row">
          <span class="price">€${p.price.toFixed(2)}</span>
          <span class="price-old">€${p.old.toFixed(2)}</span>
          <span class="badge">-${p.discount}</span>
        </div>
      </div>
    </div>
  `;
}

// ── DETAIL ────────────────────────────────────────────────────
function renderDetail() {
  const p = selectedProduct;
  if (!p) return '';
  const isAdded = addedId === p.id;
  return `
    <div class="detail-hero">
      <div class="detail-img" style="background:${p.bg}">${p.emoji}</div>
      <button class="back-btn" onclick="goTo('${prevScreen}')">←</button>
    </div>
    <div class="detail-body">
      <div class="detail-top">
        <div class="detail-name">${p.name}</div>
        <span class="badge" style="font-size:12px;padding:4px 12px;margin-top:6px">-${p.discount}</span>
      </div>
      <div class="detail-sub">${p.subtitle}</div>
      <div class="detail-price-row">
        <span class="detail-price">€${p.price.toFixed(2)}</span>
        <span class="price-old" style="font-size:16px">€${p.old.toFixed(2)}</span>
      </div>
      <div class="detail-desc">${p.desc}</div>
      <div class="benefits">
        ${p.benefits.map(b => `<span class="benefit-pill">✓ ${b}</span>`).join('')}
      </div>
      <div class="info-strip">
        <span>🚚 Envío 24-48h</span>
        <span>💳 Pago al recibir</span>
        <span>↩️ 30 días</span>
      </div>
      <button class="add-btn ${isAdded ? 'added' : ''}" onclick="addToCart(${p.id})">
        ${isAdded ? '✓ Añadido al carrito' : 'Añadir al carrito'}
      </button>
    </div>
  `;
}

// ── CART ──────────────────────────────────────────────────────
function renderCart() {
  if (cart.length === 0) return `
    <div class="cart-header"><div class="cart-title">Tu Carrito 🛒</div></div>
    <div class="empty-cart">
      <div class="ei">🛒</div>
      <p>Tu carrito está vacío.<br>¡Explora nuestros productos!</p>
      <br>
      <button class="btn-primary" onclick="goTo('shop')">Ver Productos</button>
    </div>
  `;

  const total = cart.reduce((a, b) => a + b.price * b.qty, 0);
  return `
    <div class="cart-header"><div class="cart-title">Tu Carrito 🛒</div></div>
    ${cart.map(item => `
      <div class="cart-item">
        <div class="cart-emoji">${item.emoji}</div>
        <div style="flex:1">
          <div class="cart-item-name">${item.name}</div>
          <div class="cart-item-price">€${item.price.toFixed(2)} c/u</div>
          <div class="qty-row">
            <button class="qty-btn" onclick="changeQty(${item.id},-1)">−</button>
            <span class="qty-num">${item.qty}</span>
            <button class="qty-btn" onclick="changeQty(${item.id},1)">+</button>
          </div>
        </div>
        <button class="remove-btn" onclick="removeFromCart(${item.id})">×</button>
      </div>
    `).join('')}
    <div class="cart-total-box">
      <div class="cart-total-label">Total</div>
      <div class="cart-total-amount">€${total.toFixed(2)}</div>
      <button class="checkout-btn" onclick="checkout()">Finalizar Pedido →</button>
    </div>
  `;
}

// ── Cart logic ────────────────────────────────────────────────
function addToCart(id) {
  const p = PRODUCTS.find(x => x.id === id);
  if (!p) return;
  const exists = cart.find(c => c.id === id);
  if (exists) exists.qty++;
  else cart.push({ ...p, qty: 1 });
  addedId = id;
  render();
  showToast('✓ Producto añadido al carrito');
  setTimeout(() => { addedId = null; }, 2000);
}

function changeQty(id, delta) {
  const item = cart.find(c => c.id === id);
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) removeFromCart(id);
  else render();
}

function removeFromCart(id) {
  cart = cart.filter(c => c.id !== id);
  render();
}

function updateCartBadge() {
  const total = cart.reduce((a, b) => a + b.qty, 0);
  const badge = document.getElementById('cart-count');
  badge.textContent = total;
  badge.style.display = total > 0 ? 'flex' : 'none';
}

function checkout() {
  cart = [];
  render();
  showToast('🎉 ¡Pedido recibido! Te contactaremos pronto.');
}

// ── Toast ─────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.style.opacity = '0', 2200);
}

// ── PWA Install ───────────────────────────────────────────────
let deferredPrompt = null
