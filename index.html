  <style>
    /* Mantenemos tu base y añadimos mejoras visuales */
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: #FAFAF7; font-family: 'DM Sans', sans-serif; overflow-x: hidden; color: #1C1208; }

    .app { display: flex; flex-direction: column; height: 100vh; max-width: 430px; margin: 0 auto; background: #FAFAF7; position: relative; }

    /* HEADER MEJORADO */
    .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 24px; background: #2C1810; color: white; font-family: 'Cormorant Garamond', serif; font-size: 20px; letter-spacing: 1px; }

    .screen { flex: 1; overflow-y: auto; scrollbar-width: none; padding-bottom: 80px; }
    .screen::-webkit-scrollbar { display: none; }

    /* BOTÓN WHATSAPP FLOTANTE */
    .whatsapp-float { position: fixed; bottom: 90px; right: 20px; background: #25D366; color: white; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 100; transition: transform 0.2s; text-decoration: none; }
    .whatsapp-float:active { transform: scale(0.9); }

    /* HERO MEJORADO */
    .hero { background: linear-gradient(160deg, #2C1810 0%, #4a2b1a 100%); padding: 60px 24px; color: white; text-align: center; }
    .hero h1 { font-family: 'Cormorant Garamond', serif; font-size: 42px; font-weight: 300; line-height: 1.1; margin-bottom: 15px; }
    .hero em { font-style: italic; color: #C8A96E; }

    /* PRODUCTOS */
    .product-card { background: white; border-radius: 24px; margin: 15px 20px; padding: 15px; display: flex; gap: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.03); border: 1px solid #F0EFEA; }
    .product-img { width: 100px; height: 100px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 40px; flex-shrink: 0; }
    .product-info { flex: 1; }
    .product-name { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 600; margin-bottom: 5px; }
    .price-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
    .price { font-weight: 600; font-size: 18px; color: #C8703A; }
    .price-old { text-decoration: line-through; color: #9B8B77; font-size: 14px; }

    /* NAV BAR MODERNA */
    .nav-bar { position: absolute; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 15px 0 25px; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-top: 1px solid #EDEBE6; }
    .nav-item { text-align: center; color: #9B8B77; font-size: 11px; cursor: pointer; }
    .nav-item.active { color: #C8703A; }
    .nav-icon { font-size: 22px; display: block; margin-bottom: 4px; }

    /* BOTÓN INSTALAR (OCULTO POR DEFECTO) */
    #install-banner { display: none; background: #C8703A; color: white; padding: 15px; text-align: center; font-size: 14px; cursor: pointer; }

    /* ESTILO PARA EL CARRITO */
    .checkout-footer { position: fixed; bottom: 85px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 380px; }
    .btn-checkout { width: 100%; background: #2C1810; color: white; border: none; padding: 18px; border-radius: 35px; font-size: 16px; font-weight: 500; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
  </style>
</head>
